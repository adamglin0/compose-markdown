name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, without the leading v"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish To Maven Central
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_version="${release_tag#v}"
          else
            release_version="${INPUT_VERSION}"
            release_tag="v${release_version}"
          fi

          if [[ -z "${release_version}" ]]; then
            echo "Release version must not be empty." >&2
            exit 1
          fi

          if [[ "${release_version}" == v* ]]; then
            echo "Release version must not include a leading v." >&2
            exit 1
          fi

          if [[ ! "${release_version}" =~ ^[0-9]+(\.[0-9]+)+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version must look like 1.2.3 or 1.2.3-alpha.1." >&2
            exit 1
          fi

          if [[ "${release_version}" == *"-SNAPSHOT" ]]; then
            echo "Refusing to publish a -SNAPSHOT version from the publish workflow." >&2
            exit 1
          fi

          prerelease=false
          if [[ "${release_version}" == *"-"* ]]; then
            prerelease=true
          fi

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Run CI checks
        run: ./gradlew ciCheck
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ steps.version.outputs.release_version }}

      - name: Publish artifacts
        run: >-
          ./gradlew
          :markdown-core:publishToMavenCentral
          :markdown-compose:publishToMavenCentral
          --no-configuration-cache
          --stacktrace
          --info
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ steps.version.outputs.release_version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

  github-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish.outputs.release_tag }}
          name: ${{ needs.publish.outputs.release_tag }}
          generate_release_notes: true
          prerelease: ${{ needs.publish.outputs.prerelease == 'true' }}
