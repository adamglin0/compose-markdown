name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maven-central:
    name: Publish To Maven Central
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path("build.gradle.kts").read_text()
          match = re.search(r'version\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not find the project version in build.gradle.kts")

          version = match.group(1)
          print(f"Detected project version: {version}")

          if version.endswith("-SNAPSHOT"):
              raise SystemExit("Refusing to publish a -SNAPSHOT version from the publish workflow.")

          tag_name = f"v{version}"

          if os.environ.get("GITHUB_EVENT_NAME") == "push":
              ref_name = os.environ.get("GITHUB_REF_NAME", "")
              if ref_name != tag_name:
                  raise SystemExit(
                      f"Git tag '{ref_name}' does not match project version '{version}'."
                  )

          prerelease = "true" if "-" in version else "false"

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"tag={tag_name}\n")
              output.write(f"prerelease={prerelease}\n")
          PY

      - name: Publish artifacts
        run: >-
          ./gradlew
          test
          :markdown-core:publishToMavenCentral
          :markdown-compose:publishToMavenCentral
          --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
