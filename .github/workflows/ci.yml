name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Benchmark smoke
        run: ./gradlew benchmarkSmoke

      - name: Sample dry run
        run: ./gradlew :sample-chat:run --dry-run
